name: Update video library

on:
  schedule:
    # Niedziela 06:00 UTC = 08:00 CEST / 07:00 CET
    - cron: "0 6 * * 0"
  workflow_dispatch: {}  # ręczne odpalenie z GitHub UI

# Nie pozwól na nakładające się runy (np. ręczny + cron w tym samym czasie)
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Sprawdź sekrety
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "$YOUTUBE_API_KEY" ]]; then
            echo "::error::Brak sekretu YOUTUBE_API_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [[ -z "$OPENAI_API_KEY" ]]; then
            echo "::error::Brak sekretu OPENAI_API_KEY."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch + curate
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain data/) ]]; then
            git add data/
            git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Brak zmian — nic do commitu."
          fi
